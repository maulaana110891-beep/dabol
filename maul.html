<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDesign Pro Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <section class="tools-board">
            <div class="row">
                <label class="title">Tools</label>
                <ul class="options">
                    <li class="option active" id="brush"><span>Brush</span></li>
                    <li class="option" id="eraser"><span>Penghapus</span></li>
                    <li class="option" id="rectangle"><span>Kotak</span></li>
                    <li class="option" id="circle"><span>Lingkaran</span></li>
                </ul>
            </div>
            <div class="row">
                <label class="title">Opsi & Ukuran</label>
                <ul class="options">
                    <li class="option">
                        <input type="range" id="size-slider" min="1" max="30" value="5">
                    </li>
                </ul>
            </div>
            <div class="row colors">
                <label class="title">Warna</label>
                <ul class="options">
                    <li class="option color selected"></li>
                    <li class="option color"></li>
                    <li class="option color"></li>
                    <li class="option">
                        <input type="color" id="color-picker" value="#4A98F7">
                    </li>
                </ul>
            </div>
            <div class="row buttons">
                <button class="clear-canvas">Hapus Semua</button>
                <button class="save-img">Simpan Gambar</button>
            </div>
        </section>

        <section class="drawing-board">
            <canvas id="main-canvas"></canvas>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
